<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Saathi - Customer Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            // BYPASS LOGIN: Initial state set directly to 'dashboard' instead of 'login'
            const [currentView, setCurrentView] = useState('dashboard'); 
            
            // Dashboard navigation states
            const [activeTab, setActiveTab] = useState('home'); 
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);

            // Home Tab Multi-Step Flow ('list', 'form', 'voice', 'estimate')
            const [homeView, setHomeView] = useState('list'); 

            // User & Data States
            const [customerData, setCustomerData] = useState({ name: 'Guest User', username: 'guest_user', phone: '', address: 'New Delhi, India' });
            const [signupForm, setSignupForm] = useState({ name: '', username: '', phone: '', address: '' });
            
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [editForm, setEditForm] = useState(customerData);

            // Service & Request States
            const [activeRequests, setActiveRequests] = useState([]);
            const [newService, setNewService] = useState({ type: '', date: '', details: '', photoName: '' });
            
            // Voice State
            const [isListening, setIsListening] = useState(false);

            // Location States & Dropdown Options
            const [userLocation, setUserLocation] = useState(customerData.address);
            const commonLocations = [
                "New Delhi, India", "Mumbai, India", "Bangalore, India", 
                "Chennai, India", "Kolkata, India", "Hyderabad, India", 
                "Pune, India", "Ahmedabad, India"
            ];
            const displayLocations = [...new Set([userLocation, ...commonLocations])];

            // Upgraded Estimation Engine
            const [serviceEstimates, setServiceEstimates] = useState({
                Plumber: { cost: '₹600 - ₹800', time: '2 - 4 Hours' },
                Electrician: { cost: '₹700 - ₹900', time: '1 - 3 Hours' },
                Mason: { cost: '₹800 - ₹1000', time: 'Full Day (8 Hours)' },
                Carpenter: { cost: '₹750 - ₹950', time: '4 - 6 Hours' },
                Painter: { cost: '₹500 - ₹700', time: 'Full Day (8 Hours)' }
            });

            const pastServices = [
                { id: 101, type: 'Electrician', date: '2026-06-15', status: 'Completed', worker: 'Raju Bhai', rating: '⭐️⭐️⭐️⭐️' },
                { id: 102, type: 'Painter', date: '2026-05-10', status: 'Completed', worker: 'Suresh Kumar', rating: '⭐️⭐️⭐️⭐️⭐️' }
            ];

            const handleSignup = (e) => {
                e.preventDefault();
                setCustomerData(signupForm);
                setEditForm(signupForm);
                setUserLocation(signupForm.address);
                setCurrentView('dashboard');
                setActiveTab('home');
                setHomeView('list');
            };

            const handleLogin = (e) => {
                e.preventDefault();
                setEditForm(customerData);
                setUserLocation(customerData.address);
                setCurrentView('dashboard');
                setActiveTab('home');
                setHomeView('list');
            };

            const handleLogout = () => {
                setCurrentView('login');
                setCustomerData({ name: 'Guest User', username: 'guest_user', phone: '', address: 'Default Address' });
                setIsSidebarOpen(false);
            };

            const handleSaveProfile = (e) => {
                e.preventDefault();
                setCustomerData(editForm);
                setIsEditingProfile(false);
            };

            const handleDirectSubmit = (e) => {
                e.preventDefault();
                handleConfirmJob();
            };

            // 🎤 NATIVE WEB SPEECH API FUNCTION FOR SERVICE REQUESTS
            const startServiceVoiceInput = () => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                
                if (!SpeechRecognition) {
                    alert("Your browser does not support Voice Recognition. Please use Google Chrome or Edge.");
                    return;
                }

                const recognition = new SpeechRecognition();
                recognition.lang = 'en-IN'; // Indian context
                recognition.interimResults = true;

                recognition.onstart = () => setIsListening(true);

                recognition.onresult = (event) => {
                    let transcript = Array.from(event.results)
                        .map(result => result[0].transcript)
                        .join('');
                    setNewService(prev => ({ ...prev, details: transcript }));
                };

                recognition.onerror = () => setIsListening(false);
                recognition.onend = () => setIsListening(false);
                
                recognition.start();
            };

            // 📍 REAL Geolocation & Reverse Geocoding
            const handleDetectLocation = () => {
                setUserLocation("Detecting...");
                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition(
                        async (position) => {
                            try {
                                const { latitude, longitude } = position.coords;
                                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                                const data = await res.json();
                                const locality = data.address.neighbourhood || data.address.suburb || data.address.residential || data.address.village || data.address.town;
                                const district = data.address.state_district || data.address.county || data.address.city_district || data.address.city;
                                
                                if (locality && district && locality !== district) {
                                    setUserLocation(`${locality}, ${district} (Detected)`);
                                } else if (locality || district) {
                                    setUserLocation(`${locality || district} (Detected)`);
                                } else {
                                    setUserLocation("Location Found, but area unknown");
                                }
                            } catch (err) {
                                console.error(err);
                                setUserLocation("Error reading GPS data");
                            }
                        },
                        (error) => { setUserLocation("GPS Permission Denied"); },
                        { enableHighAccuracy: true, timeout: 5000 }
                    );
                } else {
                    setUserLocation("GPS not supported by browser");
                }
            };

            // Transitions to Estimate Page AND Calls Gemini AI
            const handleNextStep = async (e) => {
                e.preventDefault();
                
                if (!newService.type || !newService.date || !newService.details) {
                    alert("Please fill out the Service, Date, and Details fields to get an AI estimate.");
                    return;
                }

                setHomeView('estimate');
                
                setServiceEstimates(prev => ({
                    ...prev,
                    [newService.type]: { cost: 'Calculating...', time: 'Analyzing details...' }
                }));

                const API_KEY = 'gen-lang-client-0374876569'; 
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

                const prompt = `
                    You are an expert blue-collar job estimator in India. 
                    A customer needs a ${newService.type}. 
                    Their specific details: "${newService.details}".
                    Estimate the time and cost in Indian Rupees (₹). 
                    Respond ONLY with a valid JSON object in this exact format: {"cost": "₹X - ₹Y", "time": "Z Hours"}
                    Do not include markdown blocks or any other text.
                `;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    let aiText = data.candidates[0].content.parts[0].text;
                    aiText = aiText.replace(/```json/g, '').replace(/```/g, '').trim();
                    const aiEstimate = JSON.parse(aiText);

                    setServiceEstimates(prev => ({ ...prev, [newService.type]: aiEstimate }));

                } catch (error) {
                    console.error("Gemini AI Error:", error);
                    setServiceEstimates(prev => ({
                        ...prev,
                        [newService.type]: { cost: '₹500 - ₹1000', time: 'Pending Assessment' }
                    }));
                }
            };

            const handleConfirmJob = () => {
                const newId = Date.now();
                setActiveRequests([{ id: newId, ...newService, status: 'Searching for workers...', location: userLocation }, ...activeRequests]);
                setNewService({ type: '', date: '', details: '', photoName: '' });
                setHomeView('list'); 

                setTimeout(() => {
                    setActiveRequests(current => 
                        current.map(req => req.id === newId ? { ...req, status: 'Worker Found & Confirmed!' } : req)
                    );
                }, 5000);
            };

            const handlePhotoUpload = (e) => {
                if(e.target.files.length > 0) {
                    setNewService({...newService, photoName: e.target.files[0].name});
                }
            };

            // --- 1. LOGIN & SIGNUP SCREENS ---
            if (currentView === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100 text-center">
                            <h1 className="text-4xl font-extrabold text-blue-900 tracking-tight mb-8">Job Saathi</h1>
                            <form onSubmit={handleLogin} className="space-y-4 text-left">
                                <input type="text" required className="w-full rounded-lg border-gray-300 border p-3 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Username / Phone" />
                                <input type="password" required className="w-full rounded-lg border-gray-300 border p-3 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Password" />
                                <button type="submit" className="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition shadow-md">Login</button>
                            </form>
                            <button onClick={() => setCurrentView('signup')} className="w-full mt-4 bg-green-50 border-2 border-green-500 text-green-700 p-3 rounded-lg font-bold hover:bg-green-100 transition">Create New Account</button>
                        </div>
                    </div>
                );
            }

            if (currentView === 'signup') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100 relative">
                            <button onClick={() => setCurrentView('login')} className="absolute top-6 left-6 text-gray-400 hover:text-blue-600 text-sm font-semibold">← Back</button>
                            <h2 className="text-2xl font-extrabold text-gray-800 text-center mb-6 mt-4">Create Account</h2>
                            <form onSubmit={handleSignup} className="space-y-4">
                                <div>
                                    <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Full Name</label>
                                    <input type="text" required value={signupForm.name} onChange={(e) => setSignupForm({...signupForm, name: e.target.value})} className="w-full rounded-lg border-gray-300 border p-3 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. Ramesh Kumar" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Username</label>
                                    <input type="text" required value={signupForm.username} onChange={(e) => setSignupForm({...signupForm, username: e.target.value.toLowerCase().replace(/\s+/g, '')})} className="w-full rounded-lg border-gray-300 border p-3 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. ramesh_kumar99" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Phone Number</label>
                                    <input type="tel" required value={signupForm.phone} onChange={(e) => setSignupForm({...signupForm, phone: e.target.value})} className="w-full rounded-lg border-gray-300 border p-3 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="+91" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Complete Address</label>
                                    <textarea required value={signupForm.address} onChange={(e) => setSignupForm({...signupForm, address: e.target.value})} className="w-full rounded-lg border-gray-300 border p-3 focus:ring-2 focus:ring-blue-500 outline-none" rows="2"></textarea>
                                </div>
                                <button type="submit" className="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition mt-2">Register</button>
                            </form>
                        </div>
                    </div>
                );
            }

            // --- 2. DASHBOARD LAYOUT & SIDEBAR ---
            return (
                <div className="min-h-screen flex relative overflow-hidden bg-gray-50">
                    
                    {/* Dark Overlay when sidebar is open */}
                    {isSidebarOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 z-40 transition-opacity" onClick={() => setIsSidebarOpen(false)}></div>
                    )}

                    {/* Sidebar / Drawer */}
                    <div className={`fixed top-0 left-0 h-full w-64 bg-white shadow-2xl z-50 transform transition-transform duration-300 ease-in-out ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="p-6 border-b border-gray-100">
                            <h2 className="text-2xl font-extrabold text-blue-900">Menu</h2>
                        </div>
                        <nav className="p-4 space-y-2">
                            <button onClick={() => { setActiveTab('home'); setHomeView('list'); setIsSidebarOpen(false); setIsEditingProfile(false); }} className={`w-full text-left px-4 py-3 rounded-lg font-bold transition-all ${activeTab === 'home' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100'}`}>🏠 Home</button>
                            <button onClick={() => { setActiveTab('recent'); setIsSidebarOpen(false); setIsEditingProfile(false); }} className={`w-full text-left px-4 py-3 rounded-lg font-bold transition-all ${activeTab === 'recent' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100'}`}>🕒 Recent Services</button>
                            <button onClick={() => { setActiveTab('profile'); setIsSidebarOpen(false); }} className={`w-full text-left px-4 py-3 rounded-lg font-bold transition-all ${activeTab === 'profile' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100'}`}>👤 Profile</button>
                            <div className="pt-4 mt-4 border-t border-gray-100">
                                <button onClick={handleLogout} className="w-full text-left px-4 py-3 rounded-lg font-bold text-red-600 hover:bg-red-50 transition-all">🚪 Log Out</button>
                            </div>
                        </nav>
                    </div>

                    {/* Main Content Area */}
                    <div className="flex-1 p-8 max-w-6xl mx-auto w-full transition-all duration-300">
                        
                        {/* Dynamic Header */}
                        <header className="mb-8 flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                            <div className="flex items-center space-x-4">
                                <button onClick={() => setIsSidebarOpen(true)} className="p-2 text-gray-500 hover:bg-gray-100 rounded-lg focus:outline-none">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                                    </svg>
                                </button>
                                
                                {activeTab === 'profile' ? (
                                    <div>
                                        <h1 className="text-3xl font-extrabold text-blue-900 tracking-tight">My Profile</h1>
                                        <p className="text-gray-500 text-lg mt-1">Username: <span className="font-semibold text-blue-600">@{customerData.username}</span></p>
                                    </div>
                                ) : (
                                    <div>
                                        <h1 className="text-3xl font-extrabold text-blue-900 tracking-tight">Job Saathi</h1>
                                        <div className="text-gray-500 mt-1 flex flex-col md:flex-row md:items-center md:space-x-2">
                                            <span>Welcome back, <span className="font-semibold text-gray-800">{customerData.name}</span></span>
                                            <span className="hidden md:inline text-gray-300">|</span>
                                            
                                            {/* Dynamic Editable Dropdown & Detectable Location */}
                                            <div className="flex items-center space-x-2 mt-1 md:mt-0">
                                                <span className="text-red-500">📍</span>
                                                <select 
                                                    value={userLocation} 
                                                    onChange={(e) => setUserLocation(e.target.value)}
                                                    className="bg-transparent font-medium text-gray-600 hover:text-blue-600 cursor-pointer outline-none appearance-none"
                                                    style={{ WebkitAppearance: 'none', MozAppearance: 'none' }}
                                                >
                                                    {displayLocations.map(loc => (
                                                        <option key={loc} value={loc} className="text-gray-800">{loc}</option>
                                                    ))}
                                                </select>
                                                <button onClick={handleDetectLocation} className="text-xs font-bold bg-blue-50 text-blue-600 px-3 py-1 rounded hover:bg-blue-100 transition shadow-sm border border-blue-100">
                                                    Detect
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </header>

                        {/* --- TAB: HOME (Multi-Step Flow) --- */}
                        {activeTab === 'home' && (
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 min-h-[500px]">
                                
                                {/* Step 1: Merged Dashboard View Split Layout (Options Left, Requests Right) */}
                                {homeView === 'list' && (
                                    <div className="animate-fade-in grid grid-cols-1 lg:grid-cols-2 gap-10">
                                        
                                        {/* Left Side: New Request Section */}
                                        <div>
                                            <h2 className="text-2xl font-bold text-gray-800 mb-6 border-b border-gray-100 pb-4">Create New Request</h2>
                                            
                                            <div className="text-center mb-8 mt-4">
                                                <h3 className="text-xl font-extrabold text-gray-900 mb-2">How would you like to request service?</h3>
                                                <p className="text-gray-500 text-sm">Choose the method that is most comfortable for you.</p>
                                            </div>

                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                {/* Voice Card */}
                                                <button onClick={() => setHomeView('voice')} className="bg-white border-2 border-blue-50 hover:border-blue-300 rounded-2xl p-6 flex flex-col items-center text-center transition-all hover:shadow-md group">
                                                    <div className="bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                                                        <span className="text-3xl">🎤</span>
                                                    </div>
                                                    <h4 className="text-lg font-bold text-gray-900 mb-1">Voice Assistant</h4>
                                                    <p className="text-gray-500 text-xs">Speak your request naturally for a hands-free experience.</p>
                                                </button>

                                                {/* Manual Form Card */}
                                                <button onClick={() => setHomeView('form')} className="bg-white border-2 border-green-50 hover:border-green-300 rounded-2xl p-6 flex flex-col items-center text-center transition-all hover:shadow-md group">
                                                    <div className="bg-green-50 w-16 h-16 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                                                        <span className="text-3xl">✍️</span>
                                                    </div>
                                                    <h4 className="text-lg font-bold text-gray-900 mb-1">Manual Form</h4>
                                                    <p className="text-gray-500 text-xs">Type out your details manually using a standard form.</p>
                                                </button>
                                            </div>
                                        </div>

                                        {/* Mobile separator */}
                                        <div className="block lg:hidden border-t border-gray-100 my-2"></div>

                                        {/* Right Side: Active Requests Section */}
                                        <div>
                                            <h2 className="text-2xl font-bold text-gray-800 mb-6 border-b border-gray-100 pb-4">Your Active Requests</h2>
                                            
                                            {activeRequests.length === 0 ? (
                                                <div className="text-center text-gray-400 py-10 bg-gray-50 rounded-2xl border border-dashed border-gray-200">
                                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-12 w-12 mx-auto mb-3 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                                                    <p className="font-semibold text-gray-500">No active requests.</p>
                                                    <p className="text-xs mt-1">Use the options on the left to hire someone.</p>
                                                </div>
                                            ) : (
                                                <div className="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                                                    {activeRequests.map((req) => (
                                                        <div key={req.id} className="border border-gray-200 rounded-xl p-5 flex flex-col justify-between items-start bg-white shadow-sm hover:shadow-md transition">
                                                            <div className="w-full flex justify-between items-center mb-2">
                                                                <h3 className="font-extrabold text-lg text-gray-900">{req.type}</h3>
                                                                <span className="text-xs font-bold bg-blue-50 text-blue-700 px-2 py-1 rounded">Date: {req.date}</span>
                                                            </div>
                                                            <p className="text-xs text-gray-500 font-semibold mb-2">📍 {req.location}</p>
                                                            <p className="text-sm text-gray-700 mb-3">{req.details}</p>
                                                            <div className="w-full flex justify-between items-center mt-auto">
                                                                {req.photoName ? (
                                                                    <p className="text-xs text-blue-500 font-semibold flex items-center">📎 {req.photoName}</p>
                                                                ) : (
                                                                    <span></span>
                                                                )}
                                                                <span className={`px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm ${req.status.includes('Confirmed') ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800 animate-pulse border border-yellow-200'}`}>
                                                                    {req.status}
                                                                </span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {/* Step 2A: Voice Request Form */}
                                {homeView === 'voice' && (
                                    <div className="max-w-2xl mx-auto py-4 animate-fade-in">
                                        <div className="flex items-center mb-6">
                                            <button onClick={() => setHomeView('list')} className="text-gray-500 hover:text-gray-700 font-semibold bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-lg transition text-sm flex items-center">
                                                ← Back to Dashboard
                                            </button>
                                        </div>
                                        
                                        <div className="text-center mb-8">
                                            <h2 className="text-3xl font-extrabold text-gray-900 mb-2">Voice Assistant</h2>
                                            <p className="text-gray-500">Tap the mic and tell us what you need.</p>
                                        </div>

                                        <div className="bg-white border border-gray-100 p-8 rounded-3xl shadow-sm text-center">
                                            <button 
                                                type="button" 
                                                onClick={startServiceVoiceInput} 
                                                className={`w-32 h-32 rounded-full flex items-center justify-center mx-auto mb-8 transition-all shadow-lg ${isListening ? 'bg-red-500 animate-pulse scale-110' : 'bg-blue-600 hover:bg-blue-700'}`}
                                            >
                                                <span className="text-6xl text-white">🎤</span>
                                            </button>
                                            
                                            {isListening && <p className="text-red-500 font-bold mb-4 animate-pulse">Listening...</p>}

                                            <div className="space-y-6 text-left">
                                                <div>
                                                    <label className="block text-sm font-semibold text-gray-700 mb-2">I heard:</label>
                                                    <textarea 
                                                        value={newService.details} 
                                                        onChange={(e) => setNewService({...newService, details: e.target.value})} 
                                                        className="w-full rounded-xl border-gray-300 border p-4 focus:ring-2 focus:ring-blue-500 outline-none shadow-sm" 
                                                        rows="3" 
                                                        placeholder="Your spoken request will appear here... you can also type to edit it."
                                                    ></textarea>
                                                </div>
                                                
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="block text-sm font-semibold text-gray-700 mb-2">Select Skill Category</label>
                                                        <input 
                                                            type="text" 
                                                            required 
                                                            list="skills-list"
                                                            value={newService.type} 
                                                            onChange={(e) => setNewService({...newService, type: e.target.value})} 
                                                            className="w-full rounded-xl border-gray-300 border p-4 focus:ring-2 focus:ring-blue-500 outline-none bg-white shadow-sm"
                                                            placeholder="Select or type..."
                                                        />
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-semibold text-gray-700 mb-2">When?</label>
                                                        <input type="date" required value={newService.date} onChange={(e) => setNewService({...newService, date: e.target.value})} className="w-full rounded-xl border-gray-300 border p-4 focus:ring-2 focus:ring-blue-500 outline-none shadow-sm" />
                                                    </div>
                                                </div>

                                                <div className="pt-4 flex flex-col md:flex-row gap-4">
                                                    <button onClick={handleNextStep} className="flex-1 bg-blue-50 text-blue-700 border-2 border-blue-200 p-4 rounded-xl font-bold hover:bg-blue-100 transition shadow-sm text-lg flex justify-center items-center space-x-2">
                                                        <span>✨ Get AI Estimate</span>
                                                    </button>
                                                    <button onClick={handleDirectSubmit} className="flex-1 bg-green-600 text-white p-4 rounded-xl font-bold hover:bg-green-700 transition shadow-md text-lg flex justify-center items-center">
                                                        <span>Post Job Directly</span>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Step 2B: Manual Request Form View */}
                                {homeView === 'form' && (
                                    <div className="max-w-2xl mx-auto animate-fade-in">
                                        <div className="flex items-center mb-6">
                                            <button onClick={() => setHomeView('list')} className="text-gray-500 hover:text-gray-700 font-semibold bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-lg transition text-sm flex items-center">
                                                ← Back to Dashboard
                                            </button>
                                        </div>
                                        
                                        <h2 className="text-2xl font-bold mb-6 text-gray-800">New Service Request</h2>

                                        <form onSubmit={handleDirectSubmit} className="space-y-6">
                                            <div>
                                                <input 
                                                    type="text" 
                                                    required 
                                                    list="skills-list"
                                                    value={newService.type} 
                                                    onChange={(e) => setNewService({...newService, type: e.target.value})} 
                                                    className="w-full rounded-xl border-gray-300 border p-4 focus:ring-2 focus:ring-blue-500 outline-none bg-white shadow-sm"
                                                    placeholder="Select or type a skill (e.g. Plumber, AC Repair...)"
                                                />
                                                <datalist id="skills-list">
                                                    <option value="Plumber" />
                                                    <option value="Electrician" />
                                                    <option value="Mason" />
                                                    <option value="Carpenter" />
                                                    <option value="Painter" />
                                                </datalist>
                                            </div>

                                            <div>
                                                <input type="date" required value={newService.date} onChange={(e) => setNewService({...newService, date: e.target.value})} className="w-full rounded-xl border-gray-300 border p-4 focus:ring-2 focus:ring-blue-500 outline-none shadow-sm" />
                                            </div>

                                            <div>
                                                <textarea required value={newService.details} onChange={(e) => setNewService({...newService, details: e.target.value})} className="w-full rounded-xl border-gray-300 border p-4 focus:ring-2 focus:ring-blue-500 outline-none shadow-sm" rows="3" placeholder="Specific Details (e.g. Need to fix a leaking pipe in the kitchen)"></textarea>
                                            </div>

                                            {/* Photo Upload Section */}
                                            <div>
                                                <div className="w-full border-2 border-dashed border-gray-300 rounded-xl p-6 text-center hover:bg-gray-50 transition cursor-pointer relative">
                                                    <input type="file" accept="image/*" onChange={handlePhotoUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                                    {newService.photoName ? (
                                                        <p className="text-blue-600 font-bold">✅ Selected: {newService.photoName}</p>
                                                    ) : (
                                                        <div className="text-gray-500">
                                                            <p className="font-semibold text-blue-600">Add a Photo (Optional)</p>
                                                            <p className="text-sm mt-1">PNG, JPG up to 5MB. Helps workers understand the job clearly.</p>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>

                                            <div className="flex flex-col md:flex-row gap-4 pt-2">
                                                <button type="button" onClick={handleNextStep} className="flex-1 bg-blue-50 text-blue-700 border-2 border-blue-200 p-4 rounded-xl font-bold hover:bg-blue-100 transition shadow-sm text-lg flex justify-center items-center space-x-2">
                                                    <span>✨ Get AI Estimate</span>
                                                </button>
                                                <button type="submit" className="flex-1 bg-green-600 text-white p-4 rounded-xl font-bold hover:bg-green-700 transition shadow-md text-lg flex justify-center items-center">
                                                    <span>Post Job Directly</span>
                                                </button>
                                            </div>
                                        </form>
                                    </div>
                                )}

                                {/* Step 3: Estimate & Confirmation View */}
                                {homeView === 'estimate' && (
                                    <div className="max-w-xl mx-auto text-center py-8 animate-fade-in">
                                        <div className="bg-blue-50 rounded-full w-24 h-24 flex items-center justify-center mx-auto mb-6">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-12 w-12 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                            </svg>
                                        </div>
                                        
                                        <h2 className="text-3xl font-extrabold text-gray-900 mb-2">Service Estimate</h2>
                                        <p className="text-gray-500 mb-8">Review the market rate and estimated time for your request.</p>

                                        <div className="bg-white border-2 border-gray-100 rounded-2xl p-6 text-left space-y-6 shadow-sm mb-8">
                                            <div className="flex justify-between items-center border-b border-gray-100 pb-4">
                                                <span className="text-gray-500 font-bold uppercase text-sm tracking-wider">Service Selected</span>
                                                <span className="text-xl font-extrabold text-gray-900">{newService.type}</span>
                                            </div>
                                            <div className="flex justify-between items-center border-b border-gray-100 pb-4">
                                                <span className="text-gray-500 font-bold uppercase text-sm tracking-wider">Estimated Time</span>
                                                <span className="text-lg font-bold text-orange-600 bg-orange-50 px-3 py-1 rounded-lg">
                                                    ⏳ {serviceEstimates[newService.type]?.time || 'Calculating...'}
                                                </span>
                                            </div>
                                            <div className="flex justify-between items-center">
                                                <span className="text-gray-500 font-bold uppercase text-sm tracking-wider">Estimated Cost</span>
                                                <span className="text-2xl font-extrabold text-green-600">
                                                    {serviceEstimates[newService.type]?.cost || 'Calculating...'}
                                                </span>
                                            </div>
                                        </div>

                                        <div className="flex flex-col md:flex-row gap-4">
                                            <button onClick={() => setHomeView('list')} className="flex-1 bg-white border-2 border-gray-200 text-gray-600 p-4 rounded-xl font-bold hover:bg-gray-50 transition shadow-sm text-lg">
                                                Go Back
                                            </button>
                                            <button onClick={handleConfirmJob} className="flex-[2] w-full bg-green-600 text-white p-4 rounded-xl font-bold hover:bg-green-700 transition shadow-lg text-lg flex justify-center items-center space-x-2">
                                                <span>Confirm & Find Workers</span>
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* --- TAB: RECENT --- */}
                        {activeTab === 'recent' && (
                            <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 min-h-[400px]">
                                <h2 className="text-2xl font-bold text-gray-800 mb-6">Service History</h2>
                                <div className="space-y-4">
                                    {pastServices.map(job => (
                                        <div key={job.id} className="border border-gray-200 rounded-xl p-5 flex justify-between items-center bg-gray-50">
                                            <div>
                                                <h3 className="font-extrabold text-lg text-gray-900">{job.type}</h3>
                                                <p className="text-sm text-gray-500">Completed on: {job.date} • Worker: {job.worker}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-lg">{job.rating}</p>
                                                <span className="text-xs font-bold text-gray-500 uppercase">Rated</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* --- TAB: PROFILE (RESTORED & Editable) --- */}
                        {activeTab === 'profile' && (
                            <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 min-h-[400px]">
                                {isEditingProfile ? (
                                    <form onSubmit={handleSaveProfile} className="max-w-md space-y-5">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Username (Cannot be changed)</label>
                                            <input type="text" readOnly value={`@${customerData.username}`} className="w-full rounded-lg border-gray-200 border p-3 bg-gray-100 text-gray-500 outline-none cursor-not-allowed font-semibold" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Full Name</label>
                                            <input type="text" required value={editForm.name} onChange={(e) => setEditForm({...editForm, name: e.target.value})} className="w-full rounded-lg border-gray-300 border p-3 focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Registered Phone</label>
                                            <input type="tel" required value={editForm.phone} onChange={(e) => setEditForm({...editForm, phone: e.target.value})} className="w-full rounded-lg border-gray-300 border p-3 focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Default Address</label>
                                            <textarea required value={editForm.address} onChange={(e) => setEditForm({...editForm, address: e.target.value})} className="w-full rounded-lg border-gray-300 border p-3 focus:ring-2 focus:ring-blue-500 outline-none" rows="3"></textarea>
                                        </div>
                                        
                                        <div className="flex space-x-3 pt-4 border-t border-gray-100">
                                            <button type="button" onClick={() => { setIsEditingProfile(false); setEditForm(customerData); }} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg font-semibold w-full transition">Cancel</button>
                                            <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold shadow-sm w-full transition">Save Changes</button>
                                        </div>
                                    </form>
                                ) : (
                                    <div className="max-w-md space-y-6">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Username</label>
                                            <p className="font-semibold text-lg text-blue-600 border-b border-gray-200 pb-2">@{customerData.username}</p>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Full Name</label>
                                            <p className="font-semibold text-lg text-gray-900 border-b border-gray-200 pb-2">{customerData.name}</p>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Registered Phone</label>
                                            <p className="font-semibold text-lg text-gray-900 border-b border-gray-200 pb-2">{customerData.phone || 'Not Provided'}</p>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Default Address</label>
                                            <p className="font-semibold text-lg text-gray-900 border-b border-gray-200 pb-2">{customerData.address}</p>
                                        </div>
                                        <button onClick={() => { setEditForm(customerData); setIsEditingProfile(true); }} className="bg-blue-50 text-blue-700 px-6 py-2 rounded-lg font-bold hover:bg-blue-100 transition mt-4 shadow-sm border border-blue-200">
                                            Edit Profile
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Add a simple fade-in animation style globally
        const style = document.createElement('style');
        style.innerHTML = `
            .animate-fade-in {
                animation: fadeIn 0.3s ease-in-out;
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
