<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Saathi - Full Hackathon Demo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            // State Machine for Views
            const [currentView, setCurrentView] = useState('login'); // 'login', 'voice-worker', 'dashboard-employer', 'dashboard-worker'
            const [role, setRole] = useState('employer');
            
            // Worker AI States
            const [callStatus, setCallStatus] = useState('inactive');
            const [transcript, setTranscript] = useState([]);
            const [extractedData, setExtractedData] = useState({ name: '', skill: '', location: '' });
            const recognitionRef = useRef(null);
            const stepRef = useRef(0);

            // Employer Dashboard States
            const [activeJobs, setActiveJobs] = useState([
                { id: 1, title: 'Masonry Worker', location: 'Site A - Downtown', wage: '₹800/day', status: '2 Workers Confirmed' }
            ]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [newJob, setNewJob] = useState({ title: '', location: '', wage: '' });

            // --- NATIVE BROWSER SPEECH ENGINE (For Worker) ---
            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = false;
                    recognitionRef.current.interimResults = false;
                    recognitionRef.current.lang = 'en-IN';

                    recognitionRef.current.onresult = (event) => {
                        const userSpeech = event.results[0][0].transcript;
                        setTranscript(prev => [...prev, { sender: 'Worker', text: userSpeech }]);
                        handleAIResponse(userSpeech);
                    };
                }
            }, []);

            const speakText = (text, nextStep) => {
                setTranscript(prev => [...prev, { sender: 'AI', text: text }]);
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-IN';
                
                utterance.onend = () => {
                    if (nextStep < 4 && recognitionRef.current) {
                        try { recognitionRef.current.start(); } catch(e) {}
                    }
                };
                window.speechSynthesis.speak(utterance);
            };

            const handleAIResponse = (userSpeech) => {
                if (stepRef.current === 1) {
                    setExtractedData(prev => ({ ...prev, name: userSpeech }));
                    stepRef.current = 2;
                    speakText("Nice to meet you. What is your primary trade or skill?", 2);
                } 
                else if (stepRef.current === 2) {
                    setExtractedData(prev => ({ ...prev, skill: userSpeech }));
                    stepRef.current = 3;
                    speakText("Got it. And what city or area are you located in?", 3);
                }
                else if (stepRef.current === 3) {
                    setExtractedData(prev => ({ ...prev, location: userSpeech }));
                    stepRef.current = 4;
                    speakText("Perfect. Your digital profile is complete. Sending you to the dashboard now.", 4);
                    
                    setTimeout(() => {
                        setCallStatus('inactive');
                        setCurrentView('dashboard-worker');
                    }, 4000);
                }
            };

            const startCall = () => {
                setCallStatus('active');
                setTranscript([]);
                setExtractedData({ name: '', skill: '', location: '' });
                stepRef.current = 1;
                speakText("Namaste! Welcome to Job Saathi. Please tell me your full name.", 1);
            };

            const stopCall = () => {
                setCallStatus('inactive');
                window.speechSynthesis.cancel();
                if (recognitionRef.current) recognitionRef.current.abort();
            };

            // --- EMPLOYER LOGIC ---
            const handlePostJob = (e) => {
                e.preventDefault();
                const newId = Date.now();
                
                // Add the job as "AI Calling Workers..."
                setActiveJobs([...activeJobs, { id: newId, ...newJob, status: 'AI Calling Workers...' }]);
                setNewJob({ title: '', location: '', wage: '' });
                setIsModalOpen(false);

                // Simulation Timer: Update status to "Confirmed" after 6 seconds
                setTimeout(() => {
                    setActiveJobs(currentJobs => 
                        currentJobs.map(job => 
                            job.id === newId ? { ...job, status: '1 Worker Confirmed' } : job
                        )
                    );
                }, 6000);
            };

            // --- 1. RENDER LOGIN SCREEN ---
            if (currentView === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
                            <div className="text-center mb-8">
                                <h1 className="text-4xl font-extrabold text-blue-900 tracking-tight">Job Saathi</h1>
                                <p className="text-gray-500 mt-2">Connecting skills with opportunities</p>
                            </div>

                            <div className="flex bg-gray-100 rounded-lg p-1 mb-6">
                                <button onClick={() => setRole('employer')} className={`flex-1 py-2 rounded-md text-sm font-bold transition-all duration-200 ${role === 'employer' ? 'bg-white shadow-sm text-blue-900' : 'text-gray-500'}`}>Employer</button>
                                <button onClick={() => setRole('worker')} className={`flex-1 py-2 rounded-md text-sm font-bold transition-all duration-200 ${role === 'worker' ? 'bg-white shadow-sm text-blue-900' : 'text-gray-500'}`}>Worker</button>
                            </div>

                            {role === 'employer' ? (
                                <div className="space-y-4">
                                    <button onClick={() => setCurrentView('dashboard-employer')} className="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition shadow-md">
                                        Login to Employer Dashboard
                                    </button>
                                </div>
                            ) : (
                                <button onClick={() => setCurrentView('voice-worker')} className="w-full bg-green-50 border-2 border-green-500 text-green-700 p-4 rounded-lg font-bold flex items-center justify-center space-x-3 hover:bg-green-100 transition shadow-sm group">
                                    <span>Register with Voice AI</span>
                                </button>
                            )}
                        </div>
                    </div>
                );
            }

            // --- 2. RENDER WORKER VOICE AI ---
            if (currentView === 'voice-worker') {
                return (
                    <div className="min-h-screen bg-gray-900 flex flex-col items-center justify-center p-6 text-white font-sans">
                        <div className="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-8">
                            
                            <div className="bg-gray-800 rounded-2xl p-8 flex flex-col items-center justify-center border border-gray-700 shadow-2xl relative">
                                <button onClick={() => { stopCall(); setCurrentView('login'); }} className="absolute top-4 left-4 text-gray-400 hover:text-white text-sm font-semibold">← Cancel</button>
                                
                                <div className="mb-8 mt-6">
                                    {callStatus === 'active' ? (
                                        <div onClick={stopCall} className="w-24 h-24 bg-red-500 rounded-full flex items-center justify-center cursor-pointer animate-pulse">
                                            <span className="font-bold">End Call</span>
                                        </div>
                                    ) : (
                                        <div onClick={startCall} className="w-24 h-24 bg-green-500 rounded-full flex items-center justify-center cursor-pointer hover:bg-green-400 transition">
                                            <span className="font-bold">Call AI</span>
                                        </div>
                                    )}
                                </div>
                                
                                <div className="w-full bg-gray-900 rounded-xl p-4 h-64 overflow-y-auto space-y-3 border border-gray-700 mt-4">
                                    {transcript.map((msg, idx) => (
                                        <div key={idx} className={`flex ${msg.sender === 'AI' ? 'justify-start' : 'justify-end'}`}>
                                            <div className={`px-4 py-2 rounded-lg max-w-[80%] ${msg.sender === 'AI' ? 'bg-blue-600 text-white' : 'bg-gray-700 text-gray-200'}`}>
                                                <span className="text-xs font-bold block mb-1 opacity-50">{msg.sender}</span>
                                                <p className="text-sm">{msg.text}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="bg-white rounded-2xl p-8 border border-gray-100 shadow-2xl text-gray-800">
                                <h2 className="text-xl font-bold text-blue-900 border-b pb-4 mb-6">Live Profile Builder</h2>
                                <div className="space-y-6">
                                    {['name', 'skill', 'location'].map((field) => (
                                        <div key={field}>
                                            <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">{field}</label>
                                            <div className={`p-3 rounded-lg border-2 transition-all duration-500 ${extractedData[field] ? 'border-green-500 bg-green-50' : 'border-dashed border-gray-300 bg-gray-50'}`}>
                                                <span className={`font-semibold ${extractedData[field] ? 'text-gray-900' : 'text-gray-400 italic'}`}>
                                                    {extractedData[field] || 'Waiting for AI...'}
                                                </span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- 3. RENDER DASHBOARDS (Worker or Employer) ---
            return (
                <div className="min-h-screen p-8 font-sans bg-gray-50">
                    <header className="mb-8 flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                        <div>
                            <h1 className="text-3xl font-bold text-blue-900">Job Saathi</h1>
                            <p className="text-gray-500">{currentView === 'dashboard-employer' ? 'Employer Command Center' : 'Worker Profile'}</p>
                        </div>
                        <div className="space-x-4">
                            {currentView === 'dashboard-employer' && (
                                <button onClick={() => setIsModalOpen(true)} className="bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700 transition shadow-sm">
                                    + Post New Job
                                </button>
                            )}
                            <button onClick={() => setCurrentView('login')} className="text-gray-500 hover:text-red-500 font-semibold px-4">Log Out</button>
                        </div>
                    </header>

                    {currentView === 'dashboard-worker' && (
                        <div className="bg-green-50 border border-green-200 rounded-xl p-6 mb-6">
                            <h2 className="text-xl font-bold text-green-800 mb-2">Registration Complete!</h2>
                            <p className="text-green-700">Welcome, <strong>{extractedData.name}</strong>. You are registered as a <strong>{extractedData.skill}</strong> in <strong>{extractedData.location}</strong>.</p>
                        </div>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {currentView === 'dashboard-employer' && (
                            <div className="col-span-1 space-y-4">
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                    <h3 className="text-gray-500 text-sm font-medium">Active Jobs</h3>
                                    <p className="text-3xl font-bold text-gray-800">{activeJobs.length}</p>
                                </div>
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                    <h3 className="text-gray-500 text-sm font-medium">Workers Placed Today</h3>
                                    <p className="text-3xl font-bold text-green-600">3</p>
                                </div>
                            </div>
                        )}

                        <div className={`${currentView === 'dashboard-employer' ? 'col-span-2' : 'col-span-3'} bg-white rounded-xl shadow-sm border border-gray-100 p-6`}>
                            <h2 className="text-xl font-bold text-gray-800 mb-4">{currentView === 'dashboard-employer' ? 'Current Requirements' : 'Available Jobs Near You'}</h2>
                            <div className="space-y-4">
                                {activeJobs.map((job) => (
                                    <div key={job.id} className="border border-gray-200 rounded-lg p-4 flex justify-between items-center bg-white transition-all">
                                        <div>
                                            <h3 className="font-bold text-lg text-gray-800">{job.title}</h3>
                                            <p className="text-sm text-gray-500">{job.location} • {job.wage}</p>
                                        </div>
                                        <div className="text-right">
                                            {currentView === 'dashboard-employer' ? (
                                                <span className={`px-3 py-1 rounded-full text-xs font-semibold ${
                                                    job.status.includes('Confirmed') ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700 animate-pulse'
                                                }`}>
                                                    {job.status}
                                                </span>
                                            ) : (
                                                <button className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-semibold hover:bg-blue-700">Accept Job</button>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center backdrop-blur-sm z-50">
                            <div className="bg-white p-6 rounded-xl shadow-xl w-full max-w-md border border-gray-100">
                                <h2 className="text-2xl font-bold mb-4 text-gray-800">Post a New Job</h2>
                                <form onSubmit={handlePostJob} className="space-y-4">
                                    <input type="text" required value={newJob.title} onChange={(e) => setNewJob({...newJob, title: e.target.value})} className="w-full rounded-lg border-gray-300 border p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Job Role (e.g. Electrician)" />
                                    <input type="text" required value={newJob.location} onChange={(e) => setNewJob({...newJob, location: e.target.value})} className="w-full rounded-lg border-gray-300 border p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Location" />
                                    <input type="text" required value={newJob.wage} onChange={(e) => setNewJob({...newJob, wage: e.target.value})} className="w-full rounded-lg border-gray-300 border p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Wage (e.g. ₹900/day)" />
                                    <div className="flex justify-end space-x-3 mt-6 pt-4 border-t border-gray-100">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">Cancel</button>
                                        <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Post Job</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
